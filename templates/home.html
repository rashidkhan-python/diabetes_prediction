<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabetes Prediction</title>
  <style>
    :root {
      --bg1: #eaf4ff;
      --bg2: #f8fbff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0d6efd;
      --primary-hover: #0b5ed7;
      --border: #dbe6f5;
      --shadow: 0 14px 35px rgba(13, 110, 253, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 32px;
      font-weight: 800;
    }

    .subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.12);
    }

    button {
      margin-top: 6px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: var(--primary-hover); }

    .result {
      margin-top: 16px;
      text-align: center;
      font-weight: 700;
      color: #0f5132;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Diabetes Prediction</h1>
    <p class="subtitle">Enter your details to generate a prediction.</p>

    <form action="{{ url_for('predict_datapoint') }}" method="post">
      <input type="text" name="Pregnancies" placeholder="Pregnancies" required />
      <input type="text" name="Glucose" placeholder="Glucose" required />
      <input type="text" name="BloodPressure" placeholder="Blood Pressure" required />
      <input type="text" name="SkinThickness" placeholder="Skin Thickness" required />
      <input type="text" name="Insulin" placeholder="Insulin" required />
      <input type="text" name="BMI" placeholder="BMI" required />
      <input type="text" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required />
      <input type="text" name="Age" placeholder="Age" required />
      <button type="submit">Predict</button>
    </form>

    {% if result %}
      <div class="result">{{ result }}</div>
    {% endif %}
  </div>
</body>
</html>
