<!-- templates/single_prediction.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prediction Result</title>
  <style>
    :root {
      --bg1: #eaf4ff;
      --bg2: #f8fbff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0d6efd;
      --primary-hover: #0b5ed7;
      --shadow: 0 16px 36px rgba(13, 110, 253, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 52px 16px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      text-align: center;
      padding: 36px 24px;
    }

    .label {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .result {
      margin: 12px 0 0;
      font-size: 56px;
      font-weight: 900;
      line-height: 1.15;
    }

    .btn {
      display: inline-block;
      margin-top: 26px;
      padding: 12px 24px;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Prediction Result</p>
    <h1 class="result">Person is: {{ result }}</h1>

    <a class="btn" href="{{ url_for('index') }}">Go Back Home</a>
  </div>
</body>
</html>
